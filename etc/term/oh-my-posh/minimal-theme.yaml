################################################################################
# Yvan Vivid - OMP theme - minimal for TTY
################################################################################
# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 3
final_space: true

blocks:
  - type: prompt
    alignment: left
    segments:
      - type: text
        style: plain
        template: "$"
        foreground: p:prompt

      - type: path
        style: plain
        template: " {{ .Path }} "
        options:
          style: full
          display_root: true
          folder_separator_icon: "/"
          mapped_locations:
            "/src/repos/me": "[me]"
            "/src/repos/forks": "[fork]"
            "/data/media": "[media]"
        foreground: p:path-fore

      - type: git
        style: plain
        template: "git:{{ .HEAD }} "
        options:
          branch_icon: ""
        foreground: p:git-fore

      - type: status
        style: plain
        template: " {{ if eq .Code 0 }}✓{{ else }}✗{{ end }}"
        foreground: p:status-err
        options:
          always_enabled: true

palette:
  prompt: "#98C379"
  path-fore: "#56B6C2"
  git-fore: "#D0666F"
  status-err: "#BF616A"
