################################################################################
# Yvan Vivid - Sheldon Config
################################################################################
# Ref: https://github.com/rossmacarthur/sheldon

shell = "zsh"

[plugins]

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[templates]
defer = "{{ hooks | get: \"pre\" | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks | get: \"post\" | nl }}"

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["{{ name }}.zsh"]

[plugins.zsh-syntax-highlighting]
github = "zsh-users/zsh-syntax-highlighting"

[plugins.base16]
github = "chriskempson/base16-shell"

[plugins.zvm]
github = "jeffreytse/zsh-vi-mode"
use = ["*.plugin.zsh"]

[plugins.zsh-docker-completions]
github = "greymd/docker-zsh-completion"
apply = ["defer"]

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"

[plugins.zsh-eza]
github = "z-shell/zsh-eza"
apply = ["defer"]

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply = ["defer"]

[plugins.fzf-zsh-plugin]
github = "unixorn/fzf-zsh-plugin"
apply = ["defer"]

